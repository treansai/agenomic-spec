apiVersion: agentlock.dev/v0.1
kind: AgentGenome
metadata:
  name: support-resolution-agent
  displayName: Support Resolution Agent
  version: 0.1.0
  description: Resolve synthetic support requests while protecting account changes behind approval policy.
  status: experimental
  owners:
    - synthetic-customer-ops
purpose:
  summary: Answer common support issues, update tickets, and escalate risky account actions.
  objectives:
    - Draft concise responses to synthetic billing and access questions.
    - Update the support ticket state after each validated action.
    - Require approval for refunds and identity-sensitive account changes.
  nonObjectives:
    - Perform irreversible account mutations without approval.
    - Bundle runtime conversation history in a release artifact.
model:
  provider: example-model-vendor
  model: assist-small-2026-01
  inferenceProfile:
    temperature: 0.3
    topP: 0.9
    maxOutputTokens: 900
prompts:
  systemPromptRef: urn:agentlock:prompt:support-resolution-system:1.0.0
  developerPromptRefs:
    - urn:agentlock:prompt:support-routing-policy:1.0.0
    - urn:agentlock:prompt:support-refund-rules:1.0.0
  operatingPrinciples:
    - Prefer clear procedural answers over speculative troubleshooting.
    - Ask for confirmation before taking any account-impacting action.
    - Escalate when the identity signal is incomplete or contradictory.
tools:
  - id: knowledge-search
    kind: mcp
    description: Search the synthetic help-center corpus and known issue summaries.
    mcp:
      serverRef: mcp://synthetic-support/knowledge
      serverVersion: 1.7.0
      transport: streamable_http
      schemaHash: "sha256:2d7a2b6f7e7b9af261e0c4720c72bdc239e0d650d8c67d2cf5b773d295ea1313"
      permissionScopes:
        - kb.read
  - id: ticket-system
    kind: mcp
    description: Read and update synthetic support tickets and escalation labels.
    mcp:
      serverRef: mcp://synthetic-support/tickets
      serverVersion: 3.0.1
      transport: sse
      schemaHash: "sha256:3e8b3c708f8c0b0372f1d5831d83ced34af1e761e9d78e3d06c884e3a6fb1414"
      permissionScopes:
        - tickets.read
        - tickets.write
  - id: approval-gateway
    kind: mcp
    description: Route refunds and account changes to synthetic human approval queues.
    mcp:
      serverRef: mcp://synthetic-governance/support-approvals
      serverVersion: 1.1.0
      transport: sse
      schemaHash: "sha256:4f9c4d81909d1c148302e6942e94dfe45bf2f872fad89f4e17d995f4b70c1515"
      permissionScopes:
        - account.change
        - refund.override
policies:
  approvals:
    defaultMode: on_policy
    requiredScopes:
      - account.change
      - refund.override
  dataHandling:
    runtimeMemoryBundling: schema-only
    piiHandling: masked
    retentionClass: thirty_days
  toolUse:
    allowUnknownTools: false
    maxConcurrentCalls: 3
memory:
  designMemory:
    schemaRef: urn:agentlock:design-memory:support-playbooks:1.0.0
    version: 1.0.0
    artifacts:
      - urn:agentlock:knowledge:refund-playbook:2026-01
      - urn:agentlock:knowledge:identity-handling:2026-01
  runtimeMemory:
    schemaRef: urn:agentlock:runtime-memory:support-session:1.3.0
    accessPolicyRef: urn:agentlock:policy:support-session-memory-access:1.0.0
    bundleInclusion: schema-only
    compatibilityClass: backward-compatible
knowledge:
  references:
    - id: support-catalog
      description: Synthetic support catalog for billing, access, and account maintenance requests.
      digest: "sha256:51ad5e92a1ae2d259413f7a53fa5ef067c03f9830be9af5f28ea06f5c81d1616"
      license: CC-BY-4.0
      uri: urn:agentlock:knowledge:support-catalog:2026-01
    - id: escalation-matrix
      description: Synthetic matrix for routing unresolved support requests to the correct queue.
      digest: "sha256:62be6fa3b2bf3e36a52408b640b6f0178d14fa941cfa0b6039fb1766d92e1717"
      license: CC-BY-4.0
      uri: urn:agentlock:knowledge:escalation-matrix:2026-01
eval:
  behaviorContractRef: behavior.contract.yaml
  replayProfile:
    sampleCount: 40
    variancePolicy: production_sampled
