apiVersion: agentlock.dev/v0.1
kind: AgentGenome
metadata:
  name: trading-risk-guard-agent
  displayName: Trading Risk Guard Agent
  version: 0.1.0
  description: Review synthetic pre-trade orders against configured limits and produce a risk disposition.
  status: experimental
  owners:
    - synthetic-market-risk
purpose:
  summary: Evaluate pre-trade risk, explain the controlling limit, and escalate override paths.
  objectives:
    - Check synthetic orders against account, instrument, and concentration limits.
    - Produce a structured risk memo for each evaluated order.
    - Require explicit approval for any override recommendation.
  nonObjectives:
    - Submit live orders to an execution venue.
    - Persist trader-specific runtime context in the release bundle.
model:
  provider: example-model-vendor
  model: reasoner-large-2026-03
  inferenceProfile:
    temperature: 0.1
    topP: 0.85
    maxOutputTokens: 1600
prompts:
  systemPromptRef: urn:agentlock:prompt:risk-guard-system:1.0.0
  developerPromptRefs:
    - urn:agentlock:prompt:risk-limit-hierarchy:1.0.0
    - urn:agentlock:prompt:override-escalation-policy:1.0.0
  operatingPrinciples:
    - Prefer block or escalate over speculative approval.
    - Identify the strictest active limit and cite it explicitly.
    - Keep the final recommendation machine-readable and audit-friendly.
tools:
  - id: market-snapshot
    kind: mcp
    description: Fetch synthetic reference prices and market state needed for notional checks.
    mcp:
      serverRef: mcp://synthetic-markets/snapshots
      serverVersion: 2.0.0
      transport: streamable_http
      schemaHash: "sha256:5a0d5e92a19f2c259504f7a53f95ee067c04f9830ce9af5f28ea06f5c81d1818"
      permissionScopes:
        - market.read
  - id: risk-limits
    kind: mcp
    description: Resolve synthetic account and instrument limit tables for the candidate order.
    mcp:
      serverRef: mcp://synthetic-risk/limits
      serverVersion: 4.2.0
      transport: sse
      schemaHash: "sha256:6b1e6fa3b2af3d36a61508b640b6f0178d14fa941cfa0b6039fb17f6d92e1919"
      permissionScopes:
        - risk.read
  - id: override-approval
    kind: mcp
    description: Request approval for synthetic limit overrides and temporary exceptions.
    mcp:
      serverRef: mcp://synthetic-risk/approvals
      serverVersion: 1.3.0
      transport: sse
      schemaHash: "sha256:7c2f70b4c3bf4e47b72619c751c700289e25fb052dfb1c7140fc2807ea3f1a1a"
      permissionScopes:
        - risk.override
        - trade.block
policies:
  approvals:
    defaultMode: on_policy
    requiredScopes:
      - risk.override
      - trade.block
  dataHandling:
    runtimeMemoryBundling: schema-only
    piiHandling: none
    retentionClass: regulated_retention
  toolUse:
    allowUnknownTools: false
    maxConcurrentCalls: 2
memory:
  designMemory:
    schemaRef: urn:agentlock:design-memory:risk-taxonomy:2.0.0
    version: 2.0.0
    artifacts:
      - urn:agentlock:knowledge:risk-limit-taxonomy:2026-01
      - urn:agentlock:knowledge:override-playbook:2026-01
  runtimeMemory:
    schemaRef: urn:agentlock:runtime-memory:risk-case:2.0.0
    accessPolicyRef: urn:agentlock:policy:risk-case-memory-access:1.0.0
    bundleInclusion: schema-only
    compatibilityClass: backward-compatible
knowledge:
  references:
    - id: synthetic-limit-book
      description: Synthetic limit handbook defining exposure, concentration, and liquidity thresholds.
      digest: "sha256:8d3081c5d4c05f58c8372ad862d81139af36ac163efc2d8251ad3918fb402b2b"
      license: CC-BY-4.0
      uri: urn:agentlock:knowledge:synthetic-limit-book:2026-01
    - id: override-playbook
      description: Synthetic approval playbook for temporary risk limit overrides.
      digest: "sha256:9e4192d6e5d16069d9483be973e9224ab047bd2740cd3e9362ce4a29ac513c3c"
      license: CC-BY-4.0
      uri: urn:agentlock:knowledge:override-playbook:2026-01
eval:
  behaviorContractRef: behavior.contract.yaml
  replayProfile:
    sampleCount: 60
    variancePolicy: stratified
