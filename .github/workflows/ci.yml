name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: schemas + conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate
      - run: bash scripts/lint-rfcs.sh

  markdown:
    name: markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx markdownlint-cli '**/*.md' --ignore node_modules --ignore CODE_OF_CONDUCT.md
